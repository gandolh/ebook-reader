<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Atrium mark: an arched opening (an atrium's light-well doorway) cut into
         a faded-ink tile — a neutral, media-agnostic glyph replacing the old
         book emoji. -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2214%22 y=%2214%22 width=%2272%22 height=%2272%22 rx=%2216%22 fill=%22%2330568b%22/><path d=%22M38 76 V50 a12 12 0 0 1 24 0 V76%22 fill=%22%23fcf9f8%22/></svg>"
    />
    <!-- iOS home-screen icon. %BASE_URL% expands to the deploy sub-path so the
         reference is correct under a non-root BASE_PATH. The manifest + its
         icon links are injected by vite-plugin-pwa at build time. -->
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <!-- Quiet Paper "paper" surface (--paper); matches the manifest theme_color
         so the browser UI stays seamless with the page. -->
    <meta name="theme-color" content="#fcf9f8" />
    <title>Atrium</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
